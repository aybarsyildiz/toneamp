name = "toneamp-proxy"
main = "worker.js"
compatibility_date = "2026-01-01"

# Rate limiting storage. Create the namespace with
#   wrangler kv namespace create USAGE
# then paste the printed id below and uncomment. The Worker runs fine
# without it (rate limiting is simply skipped).
[[kv_namespaces]]
binding = "USAGE"
id = "8a379eabbf454e67814bcb381b6a3c12"

# Demo kill switch: the in-app review code (TONEAMP-REVIEW) is DISABLED
# in production. For future update reviews: comment this out, deploy,
# submit, then re-enable after approval.
[vars]
DEMO_DISABLED = "true"
